name: TaskOn Settings Bot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'bot_settings.py'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install python-telegram-bot requests

      - name: Run Settings Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ariful5/Tkon-notifier
        run: |
          python bot_settings.py
